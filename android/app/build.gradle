android {
    namespace "com.example.nihongolens"

    compileSdkVersion 34

    defaultConfig {
        applicationId "com.example.nihongolens"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 1
        versionName "2.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}
