name: nihongo_lens
description: Japanese to English live video translator with offline ML Kit
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  speech_to_text: ^6.6.0
  google_mlkit_translation: ^0.11.0
  permission_handler: ^11.3.0
  wakelock_plus: ^1.1.4
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
